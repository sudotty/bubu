schemaVersion: 1
product:
  id: bubu
  name: BuBu
  definition: local-first AI data workspace for conversational spreadsheet analysis and automation
  defaultMode: local-private
  releaseStage: migration
architecture:
  desktop: electron
  renderer: sandboxed-react
  aiRuntime: node-utility-process
  dataCore: go-sidecar
  localDatabase: sqlite
  enterpriseDatabase: postgresql
  legacyRuntime: wails
privacy:
  defaultDisclosure: schema-synthetic
  allowedDisclosureLevels:
    - schema-only
    - schema-synthetic
    - aggregates
    - explicit-rows
  remoteRawRowsByDefault: false
capabilities:
  repository-contracts: implemented
  electron-secure-shell: implemented
  versioned-local-rpc: implemented
  local-sqlite: implemented
  dataset-catalog: implemented
  dataset-preview: implemented
  csv-import: implemented
  xlsx-import: implemented
  atomic-batch-import: implemented
  dataset-versioning: in-progress
  same-schema-replacement: implemented
  schema-drift-detection: implemented
  schema-drift-mapping: planned
  column-profiling-baseline: implemented
  profiling: in-progress
  validation: planned
  multi-table-query: legacy-partial
  privacy-gateway: in-progress
  model-context-boundary: implemented
  synthetic-examples: implemented
  safe-query-plan: planned
  model-provider-registry: in-progress
  provider-request-adapters: implemented
  openai-provider: in-progress
  anthropic-provider: in-progress
  gemini-provider: in-progress
  openai-compatible-provider: in-progress
  ollama-provider: in-progress
  dataset-conversations: planned
  dataset-groups: planned
  visualizations: legacy-partial
  workflows: planned
  bounded-agents: planned
  mcp-host: planned
  local-rag: planned
  reminders: planned
  hub: planned
  rbac: planned
  sync: planned
  signed-installers: planned
releaseGates:
  - no-secrets-or-user-data
  - architecture-boundaries
  - unit-and-contract-tests
  - production-build
  - desktop-security
  - privacy-non-disclosure
  - signed-artifacts
