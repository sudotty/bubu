name: Product bug
description: Report reproducible behavior in the current Electron product.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach real datasets, credentials, API keys, database files, or private model output.
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: What were you trying to accomplish, and what should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the exact visible error and whether data was imported, queried, or disclosed.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction with synthetic data
      description: Provide minimal steps and a synthetic or redacted example only.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS version, CPU, BuBu commit or build
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, personal data, database files, and real spreadsheet rows.
          required: true
