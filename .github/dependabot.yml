version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 6
    versioning-strategy: increase
    groups:
      electron-toolchain:
        patterns:
          - electron
          - "@electron/*"
          - "@electron-forge/*"
      react-runtime:
        patterns:
          - react
          - react-dom
          - "@types/react*"
  - package-ecosystem: gomod
    directory: /services/data-core
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 4
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:40"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 4
