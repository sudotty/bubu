name: Native package smoke

on:
  pull_request:
    paths:
      - ".github/workflows/package-smoke.yml"
      - ".github/workflows/preview-release.yml"
      - ".github/workflows/release.yml"
      - "apps/desktop/**"
      - "packages/contracts/**"
      - "services/ai-runtime/**"
      - "services/data-core/**"
      - "scripts/build-data-core.mjs"
      - "scripts/native-installer-policy.mjs"
      - "scripts/platform-paths.mjs"
      - "scripts/prepare-electron-runtime.mjs"
      - "scripts/release-artifacts.mjs"
      - "scripts/smoke-native-installer.mjs"
      - "scripts/stage-release-assets.mjs"
      - "package.json"
      - "package-lock.json"
      - ".nvmrc"
  push:
    branches: [main]
    paths:
      - ".github/workflows/package-smoke.yml"
      - ".github/workflows/preview-release.yml"
      - ".github/workflows/release.yml"
      - "apps/desktop/**"
      - "packages/contracts/**"
      - "services/ai-runtime/**"
      - "services/data-core/**"
      - "scripts/build-data-core.mjs"
      - "scripts/native-installer-policy.mjs"
      - "scripts/platform-paths.mjs"
      - "scripts/prepare-electron-runtime.mjs"
      - "scripts/release-artifacts.mjs"
      - "scripts/smoke-native-installer.mjs"
      - "scripts/stage-release-assets.mjs"
      - "package.json"
      - "package-lock.json"
      - ".nvmrc"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS 13+ arm64
            runner: macos-15
            platform: darwin
            arch: arm64
            installer: apps/desktop/out/make/BuBu.dmg
          - name: macOS 13+ x64
            runner: macos-15-intel
            platform: darwin
            arch: x64
            installer: apps/desktop/out/make/BuBu.dmg
          - name: Windows 10 22H2+ x64
            runner: windows-2025
            platform: win32
            arch: x64
            installer: apps/desktop/out/make/squirrel.windows/x64/BuBu-Setup.exe
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: services/data-core/go.mod
          cache-dependency-path: services/data-core/go.sum
      - name: Install locked dependencies
        run: npm ci
      - name: Verify native runner target
        run: |
          node -e "if(process.platform!=='${{ matrix.platform }}'||process.arch!=='${{ matrix.arch }}')throw new Error('runner target mismatch: '+process.platform+'-'+process.arch)"
      - name: Build native application
        run: npm run build
      - name: Make native installer
        run: npm run make -w @bubu/desktop -- --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --skip-package
      - name: Exercise clean install, launch, backup, restore, and uninstall
        run: node scripts/smoke-native-installer.mjs --artifact="${{ github.workspace }}/${{ matrix.installer }}" --report="${{ runner.temp }}/installer-smoke.json"
      - name: Stage deterministic package evidence
        run: node scripts/stage-release-assets.mjs --version="$(node -p "require('./package.json').version")" --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --smoke-report="${{ runner.temp }}/installer-smoke.json" --output="${{ runner.temp }}/release-stage"
      - name: Upload native package evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-package-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/release-stage
          if-no-files-found: error
          retention-days: 7
