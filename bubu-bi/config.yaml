# 应用基础配置
app:
  name: "Bubu BI"
  version: "1.0.0"
  debug: false
  log_level: "info"

# LLM服务配置
llm:
  api_key: "767a21c1-f1c4-446a-b34b-67cdf1cd9a7a"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model_id: "doubao-seed-1.6-flash-250615"
  timeout_seconds: 60

# 数据存储配置
storage:
  # 数据库配置
  database:
    path: "bubu.db"
    max_connections: 10
    connection_timeout_seconds: 30
  
  # 路径配置
  paths:
    uploads_dir: "uploads"
    downloads_dir: "downloads"
    database_file: "bubu.db"

# 文件处理配置
file_handling:
  # 文件上传配置
  upload:
    upload_dir: "uploads"
    max_file_size_mb: 300
    allowed_extensions:
      - ".csv"
      - ".xlsx"
      - ".xls"
  
  # 文件处理配置
  processing:
    supported_extensions:
      - ".csv"
      - ".xlsx"
      - ".xls"
    confidence_threshold: 0.95

# 数据导出配置
export:
  default_format: "xlsx"
  max_rows: 100000
  include_timestamp: true
  filename_template: "查询结果_%s.xlsx"
  timestamp_format: "20060102_150405"

# 系统配置
system:
  file_permissions: 0755
  config_permissions: 0644
