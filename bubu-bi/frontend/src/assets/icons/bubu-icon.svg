<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(75% 0.15 75);stop-opacity:1" />
      <stop offset="50%" style="stop-color:oklch(80% 0.18 85);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(55% 0.12 95);stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="oklch(20% 0.02 85)" flood-opacity="0.3"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="oklch(95% 0.01 85)" flood-opacity="0.8"/>
    </filter>
  </defs>
  
  <!-- Background with enhanced gold gradient -->
  <rect width="512" height="512" rx="80" ry="80" 
        fill="url(#bgGradient)" 
        stroke="oklch(45% 0.10 95)" 
        stroke-width="3"
        filter="url(#shadow)"/>
  
  <!-- Corner accent -->
  <rect x="40" y="40" width="60" height="60" rx="8" ry="8" 
        fill="none" 
        stroke="oklch(95% 0.02 85)" 
        stroke-width="3" 
        opacity="0.6"/>
  
  <!-- Main text 'bubu' with enhanced readability -->
  <g transform="translate(256, 320)" text-anchor="middle">
    <text x="0" y="0" 
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" 
          font-size="120" 
          font-weight="700"
          fill="oklch(15% 0.02 85)"
          filter="url(#textShadow)"
          letter-spacing="-2px">bubu</text>
  </g>
</svg>